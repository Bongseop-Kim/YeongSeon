name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm depcruise
      - run: pnpm knip
      - run: pnpm cpd
      - run: pnpm type-check
      - run: pnpm format:check
      - run: pnpm test:ci

  db:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.cache/supabase
          key: supabase-${{ hashFiles('supabase/config.toml') }}
      - run: supabase start -x edge-runtime,imgproxy,logflare,vector,studio
      - run: supabase db lint --level warning
      - run: supabase test db
      - run: supabase stop
        if: always()

  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep scan --config p/typescript --config p/owasp-top-ten
